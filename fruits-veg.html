<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Fruits | Shri Jeet Corporation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Morphing Container */
        .morph-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            transition: background 0.6s ease; /* Background color morph */
            min-height: 80vh;
            border-radius: 20px;
            margin: 20px;
        }

        /* The Main Image that Morphs */
        #main-morph-image {
            width: 300px;
            height: 300px;
            object-fit: contain;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2));
        }

        /* The Menu (Like the PowerPoint slide sidebar) */
        .morph-menu {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .morph-btn {
            padding: 10px 20px;
            border: 2px solid #fff;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .morph-btn:hover {
            background: white;
            color: #333;
        }
    </style>
</head>
<body style="background: #f4f4f4;">

    <div class="morph-container" id="display-area" style="background: #e74c3c;">
        <h1 id="product-title" style="color: white; margin-bottom: 30px;">Pomegranate</h1>
        
        <img src="images/Pomegranate.jpg" id="main-morph-image" alt="Fruit">

        <div class="morph-menu">
            <button class="morph-btn" onclick="morphTo('Pomegranate', 'images/Pomegranate.jpg', '#e74c3c')">Pomegranate</button>
            <button class="morph-btn" onclick="morphTo('Mangoes', 'images/Mangoes.jpg', '#f1c40f')">Mangoes</button>
            <button class="morph-btn" onclick="morphTo('Oranges', 'images/Oranges.jpg', '#e67e22')">Oranges</button>
            <button class="morph-btn" onclick="morphTo('Grapes', 'images/Grapes.jpg', '#9b59b6')">Grapes</button>
        </div>
    </div>

    <script>
        function morphTo(name, imgPath, color) {
            const img = document.getElementById('main-morph-image');
            const area = document.getElementById('display-area');
            const title = document.getElementById('product-title');

            // 1. Shrink and fade out slightly
            img.style.transform = "scale(0.5) rotate(-20deg)";
            img.style.opacity = "0";

            setTimeout(() => {
                // 2. Change the source and background color
                img.src = imgPath;
                area.style.background = color;
                title.innerText = name;

                // 3. Grow and rotate back in (The Morph Effect)
                img.style.transform = "scale(1.1) rotate(0deg)";
                img.style.opacity = "1";
            }, 300);
        }
    </script>

</body>
</html>
